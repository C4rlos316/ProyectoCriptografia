# ══════════════════════════════════════════════════════════════
# CI — Pruebas automáticas
# ══════════════════════════════════════════════════════════════
name: Tests de Cifrado
on:
  push:
    branches: [ "main", "master" ] 
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Ejecutar pytest
    runs-on: ubuntu-latest 

    steps:
      # 1. Descarga el código del repositorio en la VM
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instala Python 3.11
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instala las dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Ejecuta todos los tests con reporte detallado
      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short --no-header